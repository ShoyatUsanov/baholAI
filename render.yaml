# Render Blueprint — one-click deploy of the single-service baholAI image.
# In Render: New → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: baholai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: AUTO_SEED
        value: "true"
      - key: AI_ENABLED
        value: "false"
